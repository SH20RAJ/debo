<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container { text-align: center; }
    h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.5em; margin-bottom: 2rem; color: #4fc3f7; }
    .status { font-size: 0.875rem; color: #666; margin-bottom: 1rem; }
    .status.connected { color: #66bb6a; }
    button {
      background: transparent;
      border: 2px solid #4fc3f7;
      color: #4fc3f7;
      padding: 1rem 2.5rem;
      font-size: 1rem;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.2em;
      transition: all 0.3s;
    }
    button:hover { background: #4fc3f7; color: #0a0a0a; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    audio { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>J A R V I S</h1>
    <p class="status" id="status">Disconnected</p>
    <button id="btn" onclick="toggle()">CONNECT</button>
    <audio id="audio" autoplay></audio>
  </div>

  <script type="module">
    import { Room, RoomEvent, Track } from 'https://cdn.jsdelivr.net/npm/livekit-client@2.11.3/+esm';

    const LIVEKIT_URL = prompt('LiveKit URL:', 'wss://debo-wwbz3nal.livekit.cloud');

    let room = null;
    let connected = false;
    const statusEl = document.getElementById('status');
    const btnEl = document.getElementById('btn');
    const audioEl = document.getElementById('audio');

    window.toggle = async () => {
      if (connected) {
        await room?.disconnect();
        return;
      }

      btnEl.disabled = true;
      statusEl.textContent = 'Connecting...';

      try {
        // Get token from our serverless endpoint
        const resp = await fetch('/api/token');
        const { token } = await resp.json();

        room = new Room({
          adaptiveStream: true,
          dynacast: true,
          audioCaptureDefaults: { echoCancellation: true, noiseSuppression: true },
        });

        room.on(RoomEvent.Connected, () => {
          connected = true;
          statusEl.textContent = 'Connected';
          statusEl.className = 'status connected';
          btnEl.textContent = 'DISCONNECT';
          btnEl.disabled = false;
        });

        room.on(RoomEvent.Disconnected, () => {
          connected = false;
          statusEl.textContent = 'Disconnected';
          statusEl.className = 'status';
          btnEl.textContent = 'CONNECT';
          btnEl.disabled = false;
        });

        room.on(RoomEvent.TrackSubscribed, (track, pub, participant) => {
          if (track.kind === Track.Kind.Audio) {
            const el = track.attach();
            el.id = 'agent-audio';
            audioEl.parentNode.replaceChild(el, audioEl);
          }
        });

        await room.connect(LIVEKIT_URL, token);
        await room.localParticipant.setMicrophoneEnabled(true);

      } catch (e) {
        statusEl.textContent = 'Error: ' + e.message;
        btnEl.disabled = false;
      }
    };
  </script>
</body>
</html>
